    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Color set (on reste sur ton vibe) */
        --bg: #0b1220;
        --panel: rgba(17, 24, 39, 0.72);
        --panel-border: rgba(148, 163, 184, 0.22);
        --text: #e5e7eb;
        --muted: rgba(229, 231, 235, 0.68);
        --btn: rgba(30, 41, 59, 0.9);
        --btn-hover: rgba(51, 65, 85, 0.95);
        --accent: #60a5fa;

        /* Typography */
        --ui-font:
          Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        --mm-font:
          Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--ui-font);
        background: radial-gradient(
          1200px 600px at 10% 10%,
          #0f1b31 0%,
          var(--bg) 50%,
          #060a12 100%
        );
        color: var(--text);
      }

      .container {
        max-width: 1200px;
        padding: 20px;
        margin: 0 auto;
      }

      .header {
        padding: 22px 18px;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(30, 41, 59, 0.65),
          rgba(17, 24, 39, 0.55)
        );
        backdrop-filter: blur(8px);
      }
      .header h1 {
        margin: 0 0 8px 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .header p {
        margin: 0;
        color: rgba(229, 231, 235, 0.78);
      }

      /* Card becomes the fullscreen target so toolbar stays visible */
      .card {
        margin-top: 18px;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(30, 41, 59, 0.55),
          rgba(17, 24, 39, 0.5)
        );
        backdrop-filter: blur(8px);
        overflow: hidden;

        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 12px;
        border-bottom: 1px solid var(--panel-border);
        background: rgba(2, 6, 23, 0.35);
      }
      .toolbar-left {
        display: flex;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .toolbar-title {
        font-weight: 800;
        color: rgba(229, 231, 235, 0.92);
        font-size: 14px;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
      }
      .toolbar-right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn,
      select.select {
        border: 1px solid var(--panel-border);
        background: var(--btn);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.08s ease,
          background-color 0.12s ease;
        user-select: none;
      }
      .btn:hover,
      select.select:hover {
        background: var(--btn-hover);
      }
      .btn:active {
        transform: translateY(1px);
      }

      select.select {
        appearance: none;
        padding-right: 28px;
        background-image:
          linear-gradient(45deg, transparent 50%, rgba(229, 231, 235, 0.8) 50%),
          linear-gradient(135deg, rgba(229, 231, 235, 0.8) 50%, transparent 50%);
        background-position:
          calc(100% - 14px) calc(50% - 2px),
          calc(100% - 9px) calc(50% - 2px);
        background-size:
          5px 5px,
          5px 5px;
        background-repeat: no-repeat;
      }

      .mindmap-wrap {
        position: relative;
        min-height: 520px;
        height: min(78vh, 820px);
        background: linear-gradient(
          135deg,
          rgba(2, 6, 23, 0.25),
          rgba(2, 6, 23, 0.55)
        );
      }

      /* crucial: SVG must have real size */
      #mindmap {
        width: 100%;
        height: 100%;
        display: block;
      }

      .loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(229, 231, 235, 0.82);
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      /* Fullscreen: target the card so toolbar remains available */
      .card:fullscreen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
        margin: 0;
        background: #05070c;
      }
      .card:fullscreen .mindmap-wrap {
        height: 100%;
        min-height: 0;
        background: #05070c;
      }

      /* Page theme (light) */
      html.light {
        --bg: #f6f7fb;
        --panel: rgba(255, 255, 255, 0.75);
        --panel-border: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --btn: rgba(255, 255, 255, 0.92);
        --btn-hover: rgba(241, 245, 249, 0.98);
        --accent: #2563eb;
        --muted: rgba(15, 23, 42, 0.62);
      }
      html.light body {
        background: radial-gradient(
          1200px 600px at 10% 10%,
          #ffffff 0%,
          #f6f7fb 55%,
          #eef2ff 100%
        );
      }

      /* Markmap coloring + node themes */
      /* Base */
      #mindmap text,
      #mindmap tspan {
        font-family: var(--mm-font) !important;
        font-weight: 500 !important;
        font-size: 14px !important;
      }

      /* Dark / light map mode */
      .markmap-dark #mindmap text,
      .markmap-dark #mindmap tspan {
        fill: #e5e7eb !important;
      }
      .markmap-dark #mindmap path {
        stroke: rgba(148, 163, 184, 0.55) !important;
      }

      .markmap-light #mindmap text,
      .markmap-light #mindmap tspan {
        fill: #0f172a !important;
      }
      .markmap-light #mindmap path {
        stroke: rgba(15, 23, 42, 0.25) !important;
      }

      /* Node theme: CLASSIC */
      html.node-classic #mindmap circle {
        fill: var(--accent) !important;
        stroke: rgba(255, 255, 255, 0.82) !important;
        stroke-width: 1.6px !important;
      }

      /* Node theme: SOFT (plus doux, plus lisible) */
      html.node-soft #mindmap circle {
        fill: rgba(96, 165, 250, 0.95) !important;
        stroke: rgba(255, 255, 255, 0.9) !important;
        stroke-width: 2px !important;
        filter: drop-shadow(0 2px 10px rgba(96, 165, 250, 0.25));
      }
      html.node-soft #mindmap path {
        stroke-width: 2.2px !important;
      }
      html.node-soft #mindmap text,
      html.node-soft #mindmap tspan {
        font-weight: 700 !important;
      }

      /* Node theme: NEON (avant-gardiste mais clean) */
      html.node-neon #mindmap circle {
        fill: rgba(96, 165, 250, 1) !important;
        stroke: rgba(96, 165, 250, 0.55) !important;
        stroke-width: 6px !important; /* “halo” */
        paint-order: stroke fill;
        filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.35));
      }
      html.node-neon #mindmap path {
        stroke: rgba(96, 165, 250, 0.35) !important;
        stroke-width: 2.4px !important;
      }

      @media (max-width: 720px) {
        .container {
          padding: 12px;
        }
        .mindmap-wrap {
          min-height: 460px;
          height: 72vh;
        }
        .btn,
        select.select {
          padding: 10px 10px;
        }
      }
    </style>
  </head>

    <div class="container">

        <h1>Freya — Architecture Mindmap</h1>
        <p>
          Drag = déplacer • Molette = zoom • Clic sur un nœud = plier/déplier
        </p>
      </div>

      <div class="card" id="card">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="toolbar-title">Mindmap interactif</div>
            <div class="hint">
              Nœuds repliés par défaut • Fit auto sur resize/fullscreen
            </div>
          </div>

          <div class="toolbar-right">
            <select class="select" id="selectFont" title="Police du mindmap">
              <option value="inter">Police: Inter</option>
              <option value="system">Police: System</option>
              <option value="mono">Police: JetBrains Mono</option>
            </select>

            <select class="select" id="selectNodeTheme" title="Style des nœuds">
              <option value="classic">Nodes: Classic</option>
              <option value="soft">Nodes: Soft</option>
              <option value="neon">Nodes: Neon</option>
            </select>

            <button
              class="btn"
              id="btnTheme"
              type="button"
              title="Thème clair/sombre"
            >
              Thème
            </button>
            <button
              class="btn"
              id="btnFit"
              type="button"
              title="Recentrer / ajuster"
            >
              Fit
            </button>
            <button
              class="btn"
              id="btnFullscreen"
              type="button"
              title="Plein écran"
            >
              Plein écran
            </button>
          </div>
        </div>

        <div class="mindmap-wrap" id="mindmapWrap">
          <div class="loading" id="loading">Chargement du mindmap…</div>
          <svg
            id="mindmap"
            role="img"
            aria-label="Freya architecture mindmap"
          ></svg>
        </div>
      </div>
    </div>

      // --------- Fold default (root + level1 open, deeper folded) ----------
      function clone(obj) {
        return JSON.parse(JSON.stringify(obj));
      }

      function foldByDefault(root, expandDepth = 1) {
        // depth: root=0, children=1, etc.
        function walk(node, depth) {
          node.payload = node.payload || {};
          // fold nodes deeper than expandDepth
          node.payload.fold = depth > expandDepth ? 1 : 0;

          if (Array.isArray(node.children)) {
            node.children.forEach((c) => walk(c, depth + 1));
          }
        }
        walk(root, 0);
        return root;
      }

      // ---------------- Preferences ----------------
      const LS = {
        theme: "freya_theme",
        nodeTheme: "freya_node_theme",
        font: "freya_mm_font",
      };

      function applyPageTheme(mode) {
        const html = document.documentElement;
        html.classList.toggle("light", mode === "light");
        html.classList.toggle("markmap-dark", mode === "dark");
        html.classList.toggle("markmap-light", mode === "light");
        localStorage.setItem(LS.theme, mode);
      }

      function applyNodeTheme(name) {
        const html = document.documentElement;
        html.classList.remove("node-classic", "node-soft", "node-neon");
        html.classList.add(`node-${name}`);
        localStorage.setItem(LS.nodeTheme, name);
      }

      function applyMindmapFont(name) {
        const root = document.documentElement;
        if (name === "inter")
          root.style.setProperty(
            "--mm-font",
            "Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif",
          );
        if (name === "system")
          root.style.setProperty(
            "--mm-font",
            "system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif",
          );
        if (name === "mono")
          root.style.setProperty(
            "--mm-font",
            "'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace",
          );
        localStorage.setItem(LS.font, name);
      }

      // ---------------- Fullscreen ----------------
      async function toggleFullscreen(el) {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else {
            await el.requestFullscreen(); // user gesture required
          }
        } catch (err) {
          console.error("[fullscreen] failed:", err);
        }
      }

      // ---------------- Markmap ----------------
      let mm = null;

      function safeFit() {
        if (!mm) return;
        try {
          mm.fit();
        } catch (e) {
          console.warn("[markmap] fit() issue:", e);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        // deps check (debug-friendly)
        if (!window.d3) console.error("[deps] d3 not loaded (CDN blocked?)");
        if (!window.markmap)
          console.error("[deps] markmap-view not loaded (CDN blocked?)");

        // apply saved prefs after fonts load
        document.fonts.ready.then(() => {
          applyPageTheme(localStorage.getItem(LS.theme) || "dark");
          applyNodeTheme(localStorage.getItem(LS.nodeTheme) || "soft");
          applyMindmapFont(localStorage.getItem(LS.font) || "inter");
        });

        const card = document.getElementById("card");
        const wrap = document.getElementById("mindmapWrap");
        const svg = document.getElementById("mindmap");
        const loading = document.getElementById("loading");

        const btnTheme = document.getElementById("btnTheme");
        const btnFit = document.getElementById("btnFit");
        const btnFullscreen = document.getElementById("btnFullscreen");
        const selectNodeTheme = document.getElementById("selectNodeTheme");
        const selectFont = document.getElementById("selectFont");

        // sync selects with storage
        selectNodeTheme.value = localStorage.getItem(LS.nodeTheme) || "soft";
        selectFont.value = localStorage.getItem(LS.font) || "inter";

        btnTheme.addEventListener("click", () => {
          const current = localStorage.getItem(LS.theme) || "dark";
          applyPageTheme(current === "dark" ? "light" : "dark");
        });

        btnFit.addEventListener("click", safeFit);
        btnFullscreen.addEventListener("click", () => toggleFullscreen(card));

        selectNodeTheme.addEventListener("change", (e) =>
          applyNodeTheme(e.target.value),
        );
        selectFont.addEventListener("change", (e) => {
          applyMindmapFont(e.target.value);
          // Force mindmap re-render to apply font changes
          if (mm) {
            setTimeout(() => mm.fit(), 50);
          }
        });

        try {
          const { Markmap } = window.markmap;

          // clone + fold default
          const data = foldByDefault(clone(mindmapDataRaw), 1);

          mm = Markmap.create(
            svg,
            {
              zoom: true,
              pan: true,
              // NB: depending on markmap version, there are also options like spacing; we keep stable defaults.
            },
            data,
          );

          loading.style.display = "none";

          // fit after render
          requestAnimationFrame(() => safeFit());

          // refit on resize and fullscreen changes
          const ro = new ResizeObserver(() => safeFit());
          ro.observe(wrap);

          document.addEventListener("fullscreenchange", () => {
            // Update button label
            btnFullscreen.textContent = document.fullscreenElement
              ? "Quitter"
              : "Plein écran";
            // Small delay allows layout to settle
            setTimeout(safeFit, 60);
          });
        } catch (err) {
          console.error("[markmap] init failed:", err);
          loading.textContent =
            "Erreur de chargement du mindmap (voir console).";
        }
      });
