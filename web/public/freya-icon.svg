<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0a0e14" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- F letter stylized -->
  <g filter="url(#glow)">
    <path d="M 30 25 L 70 25 L 70 35 L 40 35 L 40 45 L 60 45 L 60 55 L 40 55 L 40 75 L 30 75 Z" 
          fill="url(#grad1)"/>
  </g>
  
  <!-- Neural network nodes -->
  <circle cx="75" cy="65" r="4" fill="#3fb950" opacity="0.8"/>
  <circle cx="80" cy="50" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="72" cy="78" r="3" fill="#a371f7" opacity="0.7"/>
  
  <!-- Connection lines -->
  <line x1="70" y1="55" x2="75" y2="65" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="45" x2="80" y2="50" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
</svg>
